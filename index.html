<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SPI SPORTS HD</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }

        #playerWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        #logo { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            width: 200px; 
            z-index: 20; 
            pointer-events: none; 
        }

        /* بەشی کۆنتڕۆڵەکان کە بە شێوەیەکی جوان لە خوارەوە دەردەکەوێت */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0; 
            transition: opacity 0.3s ease;
            z-index: 20;
        }

        #playerWrapper:hover .controls {
            opacity: 1;
        }

        button {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="playerWrapper">
        <video id="videoPlayer" playsinline autoplay muted></video>
        <img id="logo" src="https://github.com/serverblbas-svg/LOGO/blob/main/SPI%20SPORTS%20HD.png?raw=true" alt="Logo">
        
        <div class="controls">
            <button onclick="playPause()">▶️</button>
            <button onclick="toggleMute()">🔊</button>
            <button onclick="toggleFullScreen()">⛶</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const wrapper = document.getElementById('playerWrapper');
        const videoSrc = 'https://d1t5afz6qed3xk.cloudfront.net/720p-vtt/index.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            video.play();
        }

        function playPause() {
            if (video.paused) video.play();
            else video.pause();
        }

        function toggleMute() {
            video.muted = !video.muted;
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
