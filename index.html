<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SPI SPORTS HD</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }

        /* ئەمە ئەو سێکتەرە نوێیە کە هەموو شتەکانی تێدایە */
        #playerWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        /* کاتێک ئەم سێکتەرە دەچێتە فول سکرین، با قەبارەکەی 100% بێت */
        #playerWrapper:-webkit-full-screen { width: 100%; height: 100%; }
        #playerWrapper:fullscreen { width: 100%; height: 100%; }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain; /* یان cover، بەپێی خواستی خۆت */
        }
        
        /* لۆگۆکە */
        #logo { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            width: 180px; 
            z-index: 20; 
            pointer-events: none; 
        }
        
        /* کۆنتڕۆڵەکان (دوگمەکان) */
        .controls { 
            position: absolute; 
            bottom: 20px; 
            right: 20px; 
            z-index: 20; 
            display: flex; 
            gap: 10px; 
        }

        button { 
            padding: 12px 20px; 
            background: rgba(255, 204, 0, 0.9); /* ڕەنگی زەردی تۆختر بە شەفافیەتەوە */
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 30px; 
            font-size: 16px; 
            transition: background 0.3s;
        }

        button:hover { background: rgba(255, 255, 255, 0.9); } /* گۆڕانی ڕەنگ لە کاتی دانانی مشک بەسەریدا */
    </style>
</head>
<body>

    <!-- ئەمە ئەو سێکتەرە نوێیە کە هەموو شتەکانی تێدایە -->
    <div id="playerWrapper">
        
        <!-- ڤیدیۆکە -->
        <video id="videoPlayer" playsinline autoplay muted></video>

        <!-- لۆگۆکە -->
        <img id="logo" src="https://github.com/serverblbas-svg/LOGO/blob/main/SPI%20SPORTS%20HD.png?raw=true" alt="Logo">
        
        <!-- دوگمەکان -->
        <div class="controls">
            <button id="unmuteBtn" onclick="unmuteVideo()">🔊 کارکردنی دەنگ</button>
            <button id="fsBtn" onclick="toggleFullScreen()">⛶ پەخشی تەواو</button>
        </div>

    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        // گۆڕانکاری: ئێستا فول سکرین بۆ ئەم سێکتەرە دەکرێت
        const wrapper = document.getElementById('playerWrapper');
        const videoSrc = 'https://amg02873-kravemedia-mtrspt1-distrotv-mnsrl.amagi.tv/playlist/amg02873-kravemedia-mtrspt1-distrotv/playlist.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            video.play();
        }

        function unmuteVideo() {
            video.muted = false;
            document.getElementById('unmuteBtn').style.display = 'none';
        }

        // گۆڕانکاری: کردنەی فول سکرین بۆ تەواوی سێکتەرەکە نەک تەنها ڤیدیۆ
        function toggleFullScreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) { /* بۆ Safari */
                    wrapper.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* بۆ Safari */
                    document.webkitExitFullscreen();
                }
            }
        }

        // گۆڕانکاری: گۆڕینی دەقی دوگمەی فول سکرین لە کاتی گۆڕانکاری دۆخەکەدا
        document.addEventListener('fullscreenchange', updateFSButton);
        document.addEventListener('webkitfullscreenchange', updateFSButton);

        function updateFSButton() {
            const btn = document.getElementById('fsBtn');
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                btn.innerText = '⛶ کەمکردنەوەی شاشە';
            } else {
                btn.innerText = '⛶ پەخشی تەواو';
            }
        }
    </script>
</body>
</html>
