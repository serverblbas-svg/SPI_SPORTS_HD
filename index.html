<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SPI SPORTS HD</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }

        #playerWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        #logo { 
            position: absolute; 
            top: -35px; 
            right: -53px; 
            width: 300px; 
            z-index: 20; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="playerWrapper">
        <video id="videoPlayer" playsinline autoplay muted></video>
        <img id="logo" src="https://github.com/serverblbas-svg/LOGO/blob/main/SPI%20SPORTS%20HD.png?raw=true" alt="Logo">
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const videoSrc = 'https://amg02873-kravemedia-mtrspt1-distrotv-mnsrl.amagi.tv/playlist/amg02873-kravemedia-mtrspt1-distrotv/playlist.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            video.play().catch(e => console.log("Auto-play blocked, interaction required."));
        }
        
        // تێبینی: ئەگەر دەنگت نەهات، کلیکێک لە هەر شوێنێکی پەڕەکە بکە 
        // بەهۆی سیاسەتی براوسەرەکان کە رێگری لە دەنگی خۆکار دەکەن
        document.body.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
            }
        }, { once: true });
    </script>
</body>
</html>
