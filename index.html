<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SPI SPORTS HD</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #videoPlayer { width: 100vw; height: 100vh; object-fit: contain; }
        
        #logo { position: absolute; top: 10px; right: 10px; width: 100px; z-index: 150; }
        #brandName { position: absolute; top: 25px; right: 150px; color: white; 
                     font-size: 30px; font-weight: bold; z-index: 10; font-family: sans-serif; }
        
        /* ستایلی دوگمەکان */
        .controls { position: absolute; bottom: 30px; right: 30px; z-index: 10; display: flex; gap: 10px; }
        button { padding: 15px 25px; background: #ffcc00; border: none; cursor: pointer; 
                 font-weight: bold; border-radius: 30px; font-size: 18px; }
    </style>
</head>
<body>

    <img id="logo" src="https://github.com/serverblbas-svg/LOGO/blob/main/SPI%20SPORTS%20HD.png?raw=true" alt="Logo">
    
    <video id="videoPlayer" playsinline autoplay muted></video>

    <div class="controls">
        <button id="unmuteBtn" onclick="unmuteVideo()">🔊 کارکردنی دەنگ</button>
        <button onclick="toggleFullScreen()">⛶ پەخشی تەواو</button>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const videoSrc = 'https://amg02873-kravemedia-mtrspt1-distrotv-mnsrl.amagi.tv/playlist/amg02873-kravemedia-mtrspt1-distrotv/playlist.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            video.play();
        }

        function unmuteVideo() {
            video.muted = false;
            document.getElementById('unmuteBtn').style.display = 'none';
        }

        // کارکردنی فول سکرین
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                video.requestFullscreen().catch(err => {
                    alert(`هەڵەیەک ڕوویدا لە کردنەوەی فول سکرین: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
